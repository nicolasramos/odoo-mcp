version: '3.8'

services:
  odoo-mcp:
    build: .
    container_name: odoo-mcp-server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    networks:
      - odoo-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  odoo-network:
    driver: bridge
