services:
  odoo-mcp:
    build: .
    container_name: odoo-mcp
    restart: "no"
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: ["odoo-mcp"]
    # MCP stdio servers are typically launched by the MCP client process.
    # This compose service is best used for local/manual runs only.
    healthcheck:
      test: ["CMD", "python", "-m", "odoo_mcp.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
